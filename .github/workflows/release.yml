name: Release

# Publishes to npm when release-please creates a version tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  MISE_EXPERIMENTAL: "0"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - run: mise exec --locked -- npm ci

      - run: mise exec --locked -- npm run lint

      - name: Typecheck, build, and test
        run: |
          mise exec --locked -- npm run typecheck
          mise exec --locked -- npm run build
          mise exec --locked -- npm run test

      - name: Publish to npm
        run: mise exec --locked -- npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
