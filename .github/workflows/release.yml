name: Release

# Publishes to npm when release-please creates a version tag.
on:
  push:
    tags:
      - "v*"

env:
  MISE_EXPERIMENTAL: "0"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Trusted publishing (OIDC): https://docs.npmjs.com/trusted-publishers
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # npm 11.5.1+ (bundled with Node 24) exchanges the GitHub Actions OIDC
      # token for a short-lived publish grant. Do not set NODE_AUTH_TOKEN.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - run: mise exec --locked -- npm ci

      - run: mise exec --locked -- npm run lint

      - name: Typecheck, build, and test
        run: |
          mise exec --locked -- npm run typecheck
          mise exec --locked -- npm run build
          mise exec --locked -- npm run test

      - name: Publish to npm
        run: mise exec --locked -- npm publish --access public
