name: Release Please

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Tags created with GITHUB_TOKEN do not trigger other workflows (GitHub
      # anti-recursion guard). Dispatch release.yml explicitly on new releases.
      - name: Trigger npm publish
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml -R "${{ github.repository }}" --ref "${{ steps.release.outputs.tag_name }}"
