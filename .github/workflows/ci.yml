name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  MISE_EXPERIMENTAL: "0"

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - run: mise exec --locked -- npm ci

      - run: mise exec --locked -- npm run lint

      - name: Typecheck, build, and test
        if: hashFiles('src/**/*.ts') != ''
        run: |
          mise exec --locked -- npm run typecheck
          mise exec --locked -- npm run build
          mise exec --locked -- npm run test

      - name: Skip compile and integration tests (no src yet)
        if: hashFiles('src/**/*.ts') == ''
        run: echo "No src/**/*.ts; skipping typecheck, build, and test"
