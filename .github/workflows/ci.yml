name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run build

      - run: npm run test
